name: Build and Push Jobsuche MCP Server Docker Image

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
    paths:
      - 'jobsuche-mcp-server/**'
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/nanobot.sh'
      - '.github/workflows/docker-build.yml'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'jobsuche-mcp-server/**'
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/nanobot.sh'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Jobsuche MCP Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          load: ${{ github.event_name == 'pull_request' }}

      - name: Smoke test - verify nanobot starts
        if: github.event_name == 'pull_request'
        run: |
          echo "Starting container for smoke test..."
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          echo "Using image: $IMAGE_TAG"

          docker run -d --name jobsuche-test -p 8099:8099 \
            -e RUST_LOG=info \
            $IMAGE_TAG

          echo "Waiting for nanobot to start (max 30 seconds)..."
          for i in {1..15}; do
            if curl -sf http://localhost:8099/ > /dev/null 2>&1; then
              echo "Nanobot is responding on port 8099!"
              docker logs jobsuche-test
              docker stop jobsuche-test
              docker rm jobsuche-test
              exit 0
            fi
            echo "Attempt $i/15: not ready yet, waiting 2s..."
            sleep 2
          done

          echo "ERROR: Container failed to start within 30 seconds"
          echo "Container logs:"
          docker logs jobsuche-test
          docker stop jobsuche-test
          docker rm jobsuche-test
          exit 1

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}
